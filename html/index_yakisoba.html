<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>生協の商品紹介</title>
        <link rel="stylesheet" href="../css/style_yakisoba.css">

    </head>

    <body>
        <div class="hero-section">
            <div class="hero-overlay"></div>
        
            <div class="hero-content">
                <h1>焼きそば</h1>
                <p class="koukoku">迷ったらこれ！！コスパ最強！！</p>
                <p class="price">￥150</p> </div>
        </div>
        <div class="info-container">

    <h2>栄養成分表示（1包装当たり）</h2>
    <table>
        <tr>
            <th>熱量（カロリー）</th>
            <td>268 kcal</td>
        </tr>
        <tr>
            <th>蛋白質（たんぱく質）</th>
            <td>9.5 g</td>
        </tr>
        <tr>
            <th>脂質</th>
            <td>6.2 g</td>
        </tr>
        <tr>
            <th>炭水化物</th>
            <td>43.6 g</td>
        </tr>
        <tr>
            <th>食塩相当量</th>
            <td>3.8 g</td>
        </tr>
    </table>
    <div class="note">※推定値</div>

    <h2>含まれるアレルギー物質（特定原材料等）</h2>
    <ul class="allergen-list">
        <li class="allergen-item">乳成分</li>
        <li class="allergen-item">卵</li>
        <li class="allergen-item">小麦</li>
        <li class="allergen-item">オレンジ</li>
        <li class="allergen-item">鯖（さば）</li>
        <li class="allergen-item">大豆</li>
        <li class="allergen-item">とり肉</li>
        <li class="allergen-item">りんご</li>
    </ul>
    <div class="note">※原材料の一部に上記を含みます。</div>

</div>
        
    </body>
</html>
